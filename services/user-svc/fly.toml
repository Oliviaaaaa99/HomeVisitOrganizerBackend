# Fly.io app config for user-svc. Edit `app` if the name is taken on first
# `fly launch` — names are globally unique on Fly.

app = "hvo-user-svc-olivia"
primary_region = "sjc"   # San Jose. Pick whatever's close to you.

# Dockerfile path is passed via CLI (`fly deploy --dockerfile ...`) so it can
# be resolved from the repo root — the Dockerfile needs shared/go-common in
# its build context.

[http_service]
  internal_port = 8080
  force_https = true
  # Scale-to-zero: machines stop when idle and auto-start on first request.
  # Cold start ~1-2s, which is fine for a demo and keeps idle cost at ~$0.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
