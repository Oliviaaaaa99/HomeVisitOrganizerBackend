name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  GO_VERSION: "1.22"
  SERVICE_DIRS: "shared/go-common services/user-svc services/property-svc services/media-svc"

jobs:
  # gofmt + go vet — fast, no service deps. Catches syntax / style basics.
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            shared/go-common/go.sum
            services/user-svc/go.sum
            services/property-svc/go.sum
            services/media-svc/go.sum

      - name: gofmt
        run: |
          unformatted=$(gofmt -l . | grep -v '^vendor/' || true)
          if [ -n "$unformatted" ]; then
            echo "::error::Files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: |
          set -e
          for mod in $SERVICE_DIRS; do
            echo "::group::go vet $mod"
            (cd "$mod" && go vet ./...)
            echo "::endgroup::"
          done

  # Compile every Go module in the workspace.
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            shared/go-common/go.sum
            services/user-svc/go.sum
            services/property-svc/go.sum
            services/media-svc/go.sum

      - name: Build all services
        run: |
          set -e
          (cd services/user-svc && go build ./...)
          (cd services/property-svc && go build ./...)
          (cd services/media-svc && go build ./...)

  # Run unit tests with Postgres + Redis services attached, just like local dev.
  test:
    name: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: hvo
          POSTGRES_PASSWORD: hvo_dev
          POSTGRES_DB: hvo
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U hvo -d hvo"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://hvo:hvo_dev@localhost:5432/hvo?sslmode=disable
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            shared/go-common/go.sum
            services/user-svc/go.sum
            services/property-svc/go.sum
            services/media-svc/go.sum

      - name: Run tests
        run: |
          set -e
          (cd shared/go-common && go test -race -count=1 ./...)
          (cd services/user-svc && go test -race -count=1 ./...)
          (cd services/property-svc && go test -race -count=1 ./...)
          (cd services/media-svc && go test -race -count=1 ./...)

  # Round-trip migrations per service: up → down → up. Catches non-reversible
  # changes. Each service uses its own x-migrations-table, so all live on the
  # same Postgres without colliding.
  migration:
    name: migration round-trip
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: hvo
          POSTGRES_PASSWORD: hvo_dev
          POSTGRES_DB: hvo
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U hvo -d hvo"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate
        run: |
          curl -fsSL "https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz" \
            | tar -xz -C /tmp
          sudo mv /tmp/migrate /usr/local/bin/migrate
          migrate -version

      - name: Round-trip user-svc
        env:
          BASE_URL: postgres://hvo:hvo_dev@localhost:5432/hvo?sslmode=disable
        run: |
          URL="${BASE_URL}&x-migrations-table=user_svc_migrations"
          migrate -path services/user-svc/migrations -database "$URL" up
          migrate -path services/user-svc/migrations -database "$URL" down -all
          migrate -path services/user-svc/migrations -database "$URL" up

      - name: Round-trip property-svc
        env:
          BASE_URL: postgres://hvo:hvo_dev@localhost:5432/hvo?sslmode=disable
        run: |
          URL="${BASE_URL}&x-migrations-table=property_svc_migrations"
          migrate -path services/property-svc/migrations -database "$URL" up
          migrate -path services/property-svc/migrations -database "$URL" down -all
          migrate -path services/property-svc/migrations -database "$URL" up


      - name: Round-trip media-svc
        env:
          BASE_URL: postgres://hvo:hvo_dev@localhost:5432/hvo?sslmode=disable
        run: |
          URL="${BASE_URL}&x-migrations-table=media_svc_migrations"
          migrate -path services/media-svc/migrations -database "$URL" up
          migrate -path services/media-svc/migrations -database "$URL" down -all
          migrate -path services/media-svc/migrations -database "$URL" up

  # Build each Dockerfile to make sure they still work.
  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-svc, property-svc, media-svc]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
