name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  GO_VERSION: "1.22"

jobs:
  # gofmt + go vet — fast, no service deps. Catches syntax / style basics.
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            shared/go-common/go.sum
            services/user-svc/go.sum

      - name: gofmt
        run: |
          unformatted=$(gofmt -l . | grep -v '^vendor/' || true)
          if [ -n "$unformatted" ]; then
            echo "::error::Files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: |
          set -e
          for mod in shared/go-common services/user-svc; do
            echo "::group::go vet $mod"
            (cd "$mod" && go vet ./...)
            echo "::endgroup::"
          done

  # Compile every Go module in the workspace.
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            shared/go-common/go.sum
            services/user-svc/go.sum

      - name: Build all services
        run: |
          set -e
          (cd services/user-svc && go build ./...)

  # Run unit tests with Postgres + Redis services attached, just like local dev.
  test:
    name: test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: hvo
          POSTGRES_PASSWORD: hvo_dev
          POSTGRES_DB: hvo
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U hvo -d hvo"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://hvo:hvo_dev@localhost:5432/hvo?sslmode=disable
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            shared/go-common/go.sum
            services/user-svc/go.sum

      - name: Run tests
        run: |
          set -e
          (cd shared/go-common && go test -race -count=1 ./...)
          (cd services/user-svc && go test -race -count=1 ./...)

  # Round-trip migrations: up → down → up. Catches non-reversible changes.
  migration:
    name: migration round-trip
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: hvo
          POSTGRES_PASSWORD: hvo_dev
          POSTGRES_DB: hvo
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U hvo -d hvo"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install golang-migrate
        run: |
          curl -fsSL "https://github.com/golang-migrate/migrate/releases/download/v4.17.1/migrate.linux-amd64.tar.gz" \
            | tar -xz -C /tmp
          sudo mv /tmp/migrate /usr/local/bin/migrate
          migrate -version

      - name: Up
        env:
          DATABASE_URL: postgres://hvo:hvo_dev@localhost:5432/hvo?sslmode=disable
        run: migrate -path services/user-svc/migrations -database "$DATABASE_URL" up

      - name: Down all
        env:
          DATABASE_URL: postgres://hvo:hvo_dev@localhost:5432/hvo?sslmode=disable
        run: migrate -path services/user-svc/migrations -database "$DATABASE_URL" down -all

      - name: Up again (idempotency)
        env:
          DATABASE_URL: postgres://hvo:hvo_dev@localhost:5432/hvo?sslmode=disable
        run: migrate -path services/user-svc/migrations -database "$DATABASE_URL" up

  # Build the Docker image to make sure the Dockerfile still works.
  docker-build:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build user-svc image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/user-svc/Dockerfile
          push: false
          load: true
          tags: user-svc:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
