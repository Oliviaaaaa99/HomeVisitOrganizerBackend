services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: hvo
      POSTGRES_PASSWORD: hvo_dev
      POSTGRES_DB: hvo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hvo -d hvo"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3.8
    environment:
      - SERVICES=s3,sqs
      - DEBUG=0
    ports:
      - "4566:4566"
    volumes:
      - localstack:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/user-svc/migrations:/migrations/user-svc:ro
    profiles: ["tools"]
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        /migrate -path=/migrations/user-svc -database=$$DATABASE_URL up
    environment:
      DATABASE_URL: postgres://hvo:hvo_dev@postgres:5432/hvo?sslmode=disable

  user-svc:
    build:
      context: .
      dockerfile: services/user-svc/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://hvo:hvo_dev@postgres:5432/hvo?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8081:8080"
    profiles: ["app"]

volumes:
  pgdata:
  localstack:
