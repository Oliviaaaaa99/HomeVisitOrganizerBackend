services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_USER: hvo
      POSTGRES_PASSWORD: hvo_dev
      POSTGRES_DB: hvo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hvo -d hvo"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3.8
    environment:
      - SERVICES=s3,sqs
      - DEBUG=0
    ports:
      - "4566:4566"
    volumes:
      - localstack:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # The migrate sidecar applies every service's migrations in turn. Each
  # service uses its own x-migrations-table so the version sequences don't
  # collide on the shared database.
  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/user-svc/migrations:/migrations/user-svc:ro
      - ./services/property-svc/migrations:/migrations/property-svc:ro
      - ./services/media-svc/migrations:/migrations/media-svc:ro
    profiles: ["tools"]
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        BASE='postgres://hvo:hvo_dev@postgres:5432/hvo?sslmode=disable'
        for svc in user-svc property-svc media-svc; do
          tbl=$$(echo "$$svc" | tr '-' '_')_migrations
          echo ">>> migrate $$svc (table=$$tbl)"
          /migrate -path=/migrations/$$svc \
            -database="$$BASE&x-migrations-table=$$tbl" \
            up
        done

  user-svc:
    build:
      context: .
      dockerfile: services/user-svc/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://hvo:hvo_dev@postgres:5432/hvo?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-not-for-prod-12345678901234
      ENV: dev
    ports:
      - "8081:8080"
    profiles: ["app"]

  property-svc:
    build:
      context: .
      dockerfile: services/property-svc/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8082"
      DATABASE_URL: postgres://hvo:hvo_dev@postgres:5432/hvo?sslmode=disable
      JWT_SECRET: dev-secret-not-for-prod-12345678901234
    ports:
      - "8082:8082"
    profiles: ["app"]

  media-svc:
    build:
      context: .
      dockerfile: services/media-svc/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8083"
      DATABASE_URL: postgres://hvo:hvo_dev@postgres:5432/hvo?sslmode=disable
      JWT_SECRET: dev-secret-not-for-prod-12345678901234
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_S3_PATH_STYLE: "true"
      S3_BUCKET: hvo-media-dev
      S3_AUTO_CREATE_BUCKET: "true"
    ports:
      - "8083:8083"
    profiles: ["app"]

volumes:
  pgdata:
  localstack:
